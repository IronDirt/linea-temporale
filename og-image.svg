<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Dark Background -->
  <defs>
    <linearGradient id="bg_gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a2f22" />
      <stop offset="1" stop-color="#1a1410" />
    </linearGradient>
    <linearGradient id="line_grad" x1="300" y1="315" x2="900" y2="315" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c5a381" />
      <stop offset="1" stop-color="#7a6750" />
    </linearGradient>
    <filter id="center_glow_og" x="-50%" y="-50%" width="200%" height="200%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg_gradient)"/>

  <!-- Main Accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#7a6750" opacity="0.4"/>
  
  <!-- Logo with nodes (centered/symbolic) -->
  <g transform="translate(100, 165)">
    <!-- Path Line -->
    <line x1="0" y1="150" x2="300" y2="150" stroke="#c5a381" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Small Nodes -->
    <circle cx="50" cy="150" r="24" fill="#c5a381" stroke="#1a1410" stroke-width="4"/>
    <circle cx="250" cy="150" r="24" fill="#c5a381" stroke="#1a1410" stroke-width="4"/>
    
    <!-- Large Central Node -->
    <g filter="url(#center_glow_og)">
      <circle cx="150" cy="150" r="50" fill="#f2ece2"/>
      <circle cx="150" cy="150" r="40" stroke="#c5a381" stroke-width="6"/>
      <circle cx="150" cy="150" r="22" fill="#7a6750"/>
    </g>
  </g>

  <!-- Title Section -->
  <text x="500" y="300" font-family="system-ui, sans-serif" font-weight="900" font-size="84" fill="#f2ece2" letter-spacing="-2">Timeline</text>
  <text x="500" y="375" font-family="system-ui, sans-serif" font-weight="600" font-size="42" fill="#c5a381" letter-spacing="2">SALERNOHUB</text>
  <text x="500" y="440" font-family="system-ui, sans-serif" font-weight="400" font-size="28" fill="#8c8276" opacity="0.8">Crea, organizza e condividi i tuoi eventi online in modo semplice.</text>

</svg>
